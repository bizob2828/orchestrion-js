name: CI
on:
  push:
    branches:
      - main
  pull_request:
    # Run for all pull requests, regardless of target branch

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: 1.87.0
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: actions/setup-node@v4
      - name: Install
        run: npm install
      - name: Run linter
        run: npm run lint

  test:
    name: Test (${{ matrix.node-version }})
    strategy:
      matrix:
        node-version: [18, 20, 22, 24, latest]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install
        run: npm install
      - name: Run tests
        run: npm test
